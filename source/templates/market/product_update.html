{% extends "base.html" %}
{% load django_bootstrap5 %}
{% block content %}
<div class="card my-5">
    {% block title %}
    <div class="card-header fs-1 text-center py-3">Редактировать запись</div>
    {% endblock %}
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            {% include "market/product_form.html" %}
            <div class="d-flex justify-content-end gap-2 mt-3">
                <a href="{% url 'products' %}" class="btn btn-outline-secondary btn-sm">Отмена</a>
                <button type="submit" class="btn btn-primary btn-sm">Сохранить</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
