{% extends "base.html" %}
{% block content %}

<div class="container py-4">
    <div class="card mx-auto shadow-sm" style="max-width: 700px;">
        {% if product.image %}
            <img src="{{ product.image }}" class="card-img-top" style="max-height: 400px; object-fit: cover;">
        {% endif %}

        <div class="card-body">

            <h2 class="card-title">{{ product.title }}</h2>

            <p class="text-muted">
                Категория: {{ product.category }}
            </p>

            <p>
                Описание: {{ product.description }}
            </p>
            <h4 class="text-success">
                Цена: {{ product.price }}
            </h4>
            <p class="text-secondary">
                Добавлено: {{ product.created }}
            </p>
        </div>
    </div>
</div>

{% endblock %}
